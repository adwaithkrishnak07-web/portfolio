<!-- ================= FRONTEND: index.html ================= -->
<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        body {
        font-family: Arial;
    margin: 0;
    background: #000;   /* only black */
    color: #fff;        /* white text */
    }

    header {
        background: #111;
        color: #FFD700;     /* yellow */
        padding: 20px;
        text-align: center;
    }

    section {
        padding: 20px;
    }

    h2 {
        color: #FFD700;     /* yellow headings */
    }

    .card {
        background: #111;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #FFD700;
    }

    button {
        background: #FFD700;
        color: black;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #e6c200;
    }
.profile-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #FFD700;
    display: block;
    margin: 0 auto 15px;}

    </style>
</head>
<body>

<header>
    
    <h1>Adwaith Krishna K S</h1>
    <p>BCA Cloud Computing Student</p>
</header>

<section>
    <h2>About</h2>
    <div class="card">I am a BCA Cloud Computing student passionate about technology. 
        I enjoy creating clean, responsive websites and learning new tools to improve my skills.</div>

    <h2>Skills</h2>
    <div class="card">Python, HTML, CSS, JavaScript</div>

    <h2>Projects</h2>
    <div class="card">Portfolio Website</div>

    <h2>Contact</h2>
    <div class="card">
        <form id="contactForm">
            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <textarea id="message" placeholder="Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    const res = await fetch("http://localhost:3000/contact", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await res.text();
    alert(result);
});
</script>

</body>
</html>
